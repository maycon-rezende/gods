<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Diário de um Deus</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #7a6228;
      --void: #030308;
      --deep: #07070f;
      --text: #e8dcc8;
      --text-dim: #9a8f7a;
      --divine: #6a4fcf;
      --divine-light: #a07af0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
    }

    body {
      font-family: 'EB Garamond', serif;
      cursor: default;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(20,18,30,0.55), rgba(3,3,8,0.95)),
        linear-gradient(180deg, #08080f 0%, #030308 100%);
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      opacity: 0;
      transform: scale(1.05);
      transition:
        opacity 1.5s ease,
        filter 1.5s ease,
        transform 1.5s ease;
      filter: brightness(0.92) saturate(0.95);
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.08) 0%,
          rgba(0,0,0,0.18) 40%,
          rgba(0,0,0,0.28) 100%);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      animation: slide-zoom 8s ease forwards;
    }

    .slide.leaving {
      opacity: 0;
    }

    @keyframes slide-zoom {
      from {
        transform: scale(1.05);
        filter: brightness(0.9) saturate(0.95);
      }
      to {
        transform: scale(1.12);
        filter: brightness(1) saturate(1.02);
      }
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to top,
          rgba(3,3,8,0.84) 0%,
          rgba(3,3,8,0.56) 40%,
          rgba(3,3,8,0.34) 70%,
          rgba(3,3,8,0.48) 100%);
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse at center,
        transparent 45%,
        rgba(3,3,8,0.7) 100%
      );
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #content {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
      transition:
        opacity 0.9s ease,
        transform 1.1s ease,
        filter 1s ease;
    }

    #eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fade-up 1.2s 1s ease forwards;
    }

    #title-wrap {
      position: relative;
      display: inline-block;
      opacity: 0;
      animation: fade-up 1.2s 1.3s ease forwards;
    }

    #title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(3rem, 9vw, 7.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg,
        #ffffff 0%,
        #f0d080 25%,
        #c9a84c 50%,
        #fff5c0 70%,
        #7a6228 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.4));
    }

    #title-sub {
      display: block;
      font-size: 0.38em;
      letter-spacing: 0.35em;
      margin-bottom: 0.2em;
      background: linear-gradient(90deg,
        var(--divine-light), var(--gold-light), var(--divine-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #emblem {
      position: absolute;
      left: 50%;
      bottom: -58px;
      transform: translateX(-50%);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      animation:
        emblem-appear 1.5s 1.8s ease both,
        emblem-pulse 4s 3.3s ease-in-out infinite;
    }

    #emblem img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.45);
      box-shadow:
        0 0 16px rgba(201,168,76,0.5),
        0 0 38px rgba(106,79,207,0.25);
      filter: brightness(1.03) saturate(1.08);
    }

    @keyframes emblem-appear {
      from {
        opacity: 0;
        transform: translateX(-50%) scale(0.6);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
        filter: blur(0);
      }
    }

    @keyframes emblem-pulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        filter: brightness(1);
      }
      50% {
        transform: translateX(-50%) scale(1.06);
        filter: brightness(1.18);
      }
    }

    #divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent, var(--gold), var(--divine-light), var(--gold), transparent);
      margin: 5.2rem auto 1.8rem;
      animation: expand-line 1.2s 2s ease forwards;
    }

    @keyframes expand-line {
      from {
        width: 0;
        opacity: 0;
      }
      to {
        width: 200px;
        opacity: 1;
      }
    }

    #phrase {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      color: var(--text-dim);
      line-height: 1.9;
      max-width: 520px;
      opacity: 0;
      animation: fade-up 1.2s 2.2s ease forwards;
    }

    #names {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.8rem;
      margin-top: 1.8rem;
      opacity: 0;
      animation: fade-up 1.2s 2.6s ease forwards;
    }

    .char-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 1.5vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .char-name.gods {
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    .char-name.guardians {
      color: var(--divine-light);
      text-shadow: 0 0 20px rgba(160,122,240,0.3);
    }

    .name-sep {
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      opacity: 0.5;
    }

    .name-sep.long {
      opacity: 0.3;
      font-size: 1rem;
      margin: 0 0.3rem;
    }

    #enter-btn {
      position: relative;
      margin-top: 3rem;
      padding: 1rem 3.5rem;
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      cursor: pointer;
      pointer-events: all;
      overflow: hidden;
      opacity: 0;
      animation: fade-up 1.2s 3s ease forwards;
      transition:
        border-color 0.4s,
        color 0.4s,
        box-shadow 0.4s,
        letter-spacing 0.4s,
        transform 0.25s ease,
        background 0.4s;
      backdrop-filter: blur(8px);
    }

    #enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(201,168,76,0) 0%,
        rgba(201,168,76,0.08) 50%,
        rgba(201,168,76,0) 100%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    #enter-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -100%;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent, var(--gold-light), transparent);
      transition: left 0.5s ease;
    }

    #enter-btn:hover {
      border-color: var(--gold-light);
      color: #ffffff;
      background: rgba(255,255,255,0.03);
      box-shadow:
        0 0 30px rgba(201,168,76,0.2),
        0 0 60px rgba(201,168,76,0.1),
        inset 0 0 30px rgba(201,168,76,0.05);
      letter-spacing: 0.55em;
    }

    #enter-btn:hover::before {
      opacity: 1;
    }

    #enter-btn:hover::after {
      left: 100%;
    }

    #enter-btn:active {
      transform: scale(0.97);
    }

    #btn-text {
      position: relative;
      z-index: 1;
    }

    #btn-line {
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.06),
        transparent);
      transform: skewX(-20deg);
      animation: btn-shine 4s 4s ease infinite;
    }

    @keyframes btn-shine {
      0% { left: -100%; }
      30% { left: 150%; }
      100% { left: 150%; }
    }

    #slide-dots {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      opacity: 0;
      animation: fade-up 1.2s 3.2s ease forwards;
      pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(201,168,76,0.25);
      transition: all 0.5s ease;
    }

    .dot.active {
      background: var(--gold-light);
      box-shadow: 0 0 8px rgba(201,168,76,0.6);
      width: 18px;
      border-radius: 3px;
    }

    #transition-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.04) 0%,
          rgba(10,10,16,0.12) 18%,
          rgba(3,3,8,0.82) 55%,
          rgba(3,3,8,1) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease, backdrop-filter 0.7s ease;
      backdrop-filter: blur(0px);
    }

    #transition-screen.fade-in {
      opacity: 1;
      pointer-events: all;
      backdrop-filter: blur(10px);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @media (max-width: 768px) {
      .slide {
        background-position: center 20%;
      }

      #emblem {
        width: 60px;
        height: 60px;
        bottom: -48px;
      }

      #divider {
        margin: 4.4rem auto 1.4rem;
      }

      #phrase {
        font-size: 0.92rem;
        padding: 0 1rem;
        line-height: 1.8;
      }

      #names {
        gap: 0.4rem 0.6rem;
        margin-top: 1.4rem;
        padding: 0 1rem;
      }

      .name-sep.long {
        display: none;
      }

      #enter-btn {
        margin-top: 2.2rem;
        padding: 0.9rem 2.8rem;
        font-size: 0.75rem;
      }

      #slide-dots {
        bottom: 1.8rem;
      }
    }

    @media (max-width: 480px) {
      #content {
        padding: 1.5rem;
      }

      .slide {
        background-position: center 22%;
      }

      #emblem {
        width: 52px;
        height: 52px;
        bottom: -42px;
      }

      #eyebrow {
        font-size: 0.58rem;
        letter-spacing: 0.3em;
      }

      #divider {
        margin: 4rem auto 1.2rem;
      }

      #phrase {
        font-size: 0.88rem;
        line-height: 1.75;
      }

      #names {
        margin-top: 1.2rem;
      }

      .char-name {
        font-size: 0.65rem;
      }

      #enter-btn {
        margin-top: 2rem;
        padding: 0.85rem 2.4rem;
        font-size: 0.7rem;
        letter-spacing: 0.35em;
      }

      #slide-dots {
        bottom: 1.5rem;
        gap: 0.5rem;
      }

      .dot {
        width: 4px;
        height: 4px;
      }

      .dot.active {
        width: 14px;
      }
    }

    @media (max-width: 360px) {
      #title {
        font-size: clamp(2.2rem, 11vw, 3rem);
      }

      #phrase {
        font-size: 0.82rem;
      }

      #enter-btn {
        padding: 0.8rem 2rem;
        font-size: 0.65rem;
      }

      .char-name {
        font-size: 0.6rem;
      }

      .name-sep {
        font-size: 0.65rem;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      #content {
        justify-content: flex-start;
        padding-top: 4rem;
        overflow-y: auto;
      }

      #emblem {
        width: 50px;
        height: 50px;
        bottom: -38px;
      }

      #divider {
        margin-top: 3.6rem;
      }

      #phrase {
        font-size: 0.85rem;
      }

      #names {
        margin-top: 1rem;
      }

      #enter-btn {
        margin-top: 1.5rem;
      }

      #slide-dots {
        bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <audio autoplay loop hidden>
    <source src="audio/themepic.mp3" type="audio/mpeg" />
  </audio>

  <canvas id="particles"></canvas>

  <div id="slideshow">
    <div class="slide active" style="background-image: url('img-knull/nullk.png'); background-position: center 18%;"></div>
    <div class="slide" style="background-image: url('img-knull/knullsay.png'); background-position: center 12%;"></div>
    <div class="slide" style="background-image: url('img-knull/k.png'); background-position: center 15%;"></div>
    <div class="slide" style="background-image: url('img-nimsay/armescura1.png'); background-position: center 18%;"></div>
    <div class="slide" style="background-image: url('img-nimsay/nimbanner.png'); background-position: center 15%;"></div>
    <div class="slide" style="background-image: url('img-knull/knull.png'); background-position: center 16%;"></div>
  </div>

  <div id="overlay"></div>
  <div id="vignette"></div>

  <div id="content">
    <p id="eyebrow">A saga de Knull</p>

    <div id="title-wrap">
      <h1 id="title">
        <span id="title-sub">O Diário de um</span>
        Deus
      </h1>

      <div id="emblem">
        <img src="img-logo/olhos.jpg" alt="Olho dourado">
      </div>
    </div>

    <div id="divider"></div>

    <p id="phrase">
      Não nasci como um deus..<br>
      Mas, ultrapassei o nível de um
    </p>

    <div id="names">
      <span class="char-name gods">Knull</span>
      <span class="name-sep">·</span>
      <span class="char-name gods">Onull</span>
      <span class="name-sep">·</span>
      <span class="char-name gods">Anull</span>
      <span class="name-sep long">—</span>
      <span class="char-name guardians">Nimsay</span>
      <span class="name-sep">·</span>
      <span class="char-name guardians">Aicitel</span>
      <span class="name-sep">·</span>
      <span class="char-name guardians">Aliban</span>
    </div>

    <button id="enter-btn">
      <span id="btn-text">Entrar</span>
      <span id="btn-line"></span>
    </button>

    <div id="slide-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div id="transition-screen"></div>

  <script>
    (function () {
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      let current = 0;
      let timer = null;

      function goTo(index) {
        const currentSlide = slides[current];
        currentSlide.classList.remove('active');
        currentSlide.classList.add('leaving');
        dots[current].classList.remove('active');

        setTimeout(() => {
          currentSlide.classList.remove('leaving');
          currentSlide.style.transform = 'scale(1)';
        }, 1500);

        current = index;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      function next() {
        goTo((current + 1) % slides.length);
      }

      function startTimer() {
        clearInterval(timer);
        timer = setInterval(next, 6000);
      }

      dots.forEach((dot, i) => {
        dot.style.pointerEvents = 'all';
        dot.addEventListener('click', () => {
          goTo(i);
          startTimer();
        });
      });

      startTimer();
    })();

    (function () {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initParticles() {
        particles = [];

        for (let i = 0; i < 80; i++) {
          particles.push({
            type: 'gold',
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.8 + 0.3,
            a: Math.random() * 0.7 + 0.1,
            speedX: (Math.random() - 0.5) * 0.25,
            speedY: -(Math.random() * 0.4 + 0.1),
            twinkle: Math.random() * Math.PI * 2,
            tSpeed: Math.random() * 0.02 + 0.01
          });
        }

        for (let i = 0; i < 40; i++) {
          particles.push({
            type: 'divine',
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 2.2 + 0.5,
            a: Math.random() * 0.5 + 0.1,
            speedX: (Math.random() - 0.5) * 0.2,
            speedY: -(Math.random() * 0.3 + 0.05),
            twinkle: Math.random() * Math.PI * 2,
            tSpeed: Math.random() * 0.015 + 0.008
          });
        }

        for (let i = 0; i < 15; i++) {
          particles.push({
            type: 'spark',
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 3.5 + 1.5,
            a: Math.random() * 0.4 + 0.05,
            speedX: (Math.random() - 0.5) * 0.15,
            speedY: -(Math.random() * 0.2 + 0.05),
            twinkle: Math.random() * Math.PI * 2,
            tSpeed: Math.random() * 0.01 + 0.005
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        particles.forEach(p => {
          p.x += p.speedX;
          p.y += p.speedY;
          p.twinkle += p.tSpeed;

          if (p.y < -10) {
            p.y = H + 10;
            p.x = Math.random() * W;
          }
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;

          const alpha = p.a * (0.5 + 0.5 * Math.sin(p.twinkle));

          if (p.type === 'gold') {
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
            grad.addColorStop(0, `rgba(240,208,120,${alpha})`);
            grad.addColorStop(1, 'rgba(201,168,76,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,240,180,${alpha * 1.4})`;
            ctx.fill();
          } else if (p.type === 'divine') {
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
            grad.addColorStop(0, `rgba(160,122,240,${alpha})`);
            grad.addColorStop(1, 'rgba(106,79,207,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,180,255,${alpha * 1.2})`;
            ctx.fill();
          } else if (p.type === 'spark') {
            const size = p.r * (0.8 + 0.4 * Math.sin(p.twinkle));
            ctx.save();
            ctx.translate(p.x, p.y);

            const gH = ctx.createLinearGradient(-size * 4, 0, size * 4, 0);
            gH.addColorStop(0, 'rgba(240,208,120,0)');
            gH.addColorStop(0.5, `rgba(255,245,200,${alpha})`);
            gH.addColorStop(1, 'rgba(240,208,120,0)');
            ctx.fillStyle = gH;
            ctx.fillRect(-size * 4, -size * 0.3, size * 8, size * 0.6);

            const gV = ctx.createLinearGradient(0, -size * 4, 0, size * 4);
            gV.addColorStop(0, 'rgba(240,208,120,0)');
            gV.addColorStop(0.5, `rgba(255,245,200,${alpha})`);
            gV.addColorStop(1, 'rgba(240,208,120,0)');
            ctx.fillStyle = gV;
            ctx.fillRect(-size * 0.3, -size * 4, size * 0.6, size * 8);

            ctx.beginPath();
            ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,240,${alpha * 1.5})`;
            ctx.fill();

            ctx.restore();
          }
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => {
        resize();
        initParticles();
      });

      resize();
      initParticles();
      draw();
    })();

    (function () {
      const btn = document.getElementById('enter-btn');
      const transition = document.getElementById('transition-screen');
      const content = document.getElementById('content');
      const dots = document.getElementById('slide-dots');
      const overlay = document.getElementById('overlay');
      const vignette = document.getElementById('vignette');

      function enterSite() {
        if (btn.disabled) return;

        btn.disabled = true;
        btn.style.pointerEvents = 'none';

        const activeSlide = document.querySelector('.slide.active');

        if (activeSlide) {
          activeSlide.style.animation = 'none';
          activeSlide.style.transition =
            'transform 1.4s cubic-bezier(0.22, 1, 0.36, 1), filter 1.4s ease, opacity 1.4s ease';
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              activeSlide.style.transform = 'scale(1.08)';
              activeSlide.style.filter = 'brightness(1.04) saturate(1.05) blur(1px)';
            });
          });
        }

        content.style.opacity = '0';
        content.style.transform = 'scale(1.03) translateY(-8px)';
        content.style.filter = 'blur(10px)';
        dots.style.opacity = '0';
        overlay.style.opacity = '0.18';
        vignette.style.opacity = '0.25';

        setTimeout(() => {
          transition.classList.add('fade-in');
        }, 850);

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1750);
      }

      btn.addEventListener('click', enterSite);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          enterSite();
        }
      });
    })();
  </script>
</body>
</html>
